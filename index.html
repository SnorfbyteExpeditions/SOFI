<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Secret of Fire Island</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="is-intro-active">
  <audio id="intro-audio" src="sound/borrowedSoundTrack.mp3" preload="auto" playsinline aria-hidden="true"></audio>
  <audio id="game-audio" src="sound/PalosaariLegacy.mp3" preload="auto" loop playsinline aria-hidden="true"></audio>
  <div id="intro-overlay" class="intro-overlay" role="button" tabindex="0" aria-label="Start the game">
    <button id="intro-start-button" class="intro-start-button" type="button">I Want to Be a Software Developer!</button>
    <img id="intro-prelude" class="intro-prelude" src="images/wapiceLogo.png" alt="" aria-hidden="true">
    <img id="intro-main-scene" class="intro-main-scene" src="images/SecretOfFireIsland_IntroWithoutTitle.png" alt="" aria-hidden="true">
    <img class="intro-title" src="images/Title1.png" alt="" aria-hidden="true">
    <div class="intro-copy" aria-live="polite">
      <span id="intro-text" class="intro-line"></span>
    </div>
  </div>

  <div class="game-stage">
    <main id="game-window" class="game-window" aria-label="The Secret of Fire Island game window">
      <section id="scene" class="scene" aria-label="Street scene">
        <img class="scene-background" src="images/scenes/DomusBothnica_pixelated.png" alt="" aria-hidden="true">
        <!-- <img class="lobby-lower-overlay" src="images/scenes/HqLobby_bottom.png" alt="" aria-hidden="true"> -->

        <button class="hotspot hotspot-mentor" type="button" data-target="mentor" aria-label="Mighty Pirate Manager Petri">
          <span class="sprite sprite-npc" aria-hidden="true">
            <img class="img-npc" src="images/PetriFront.png" alt="" aria-hidden="true">
          </span>
          <span class="sr-only">Mighty Pirate Manager Petri</span>
        </button>

        <button class="hotspot hotspot-centaur" type="button" data-target="centaur" aria-label="Centaur">
          <img class="img-npc" src="images/centaur.png" alt="" aria-hidden="true">
          <span class="sr-only">Centaur</span>
        </button>

        <button class="hotspot hotspot-duck" type="button" data-target="duck" aria-label="Rubber duck">
          <img class="img-npc" src="images/rubberduck.png" alt="" aria-hidden="true">
          <span class="sr-only">Rubber duck</span>
        </button>

        <button class="hotspot hotspot-bench-guy" type="button" data-target="benchGuy" aria-label="Sauna Guru">
          <span class="sr-only">Sauna Guru</span>
        </button>

        <button class="hotspot hotspot-jukka-bros" type="button" data-target="jukkaBros" aria-label="JukkaBros">
          <span class="sr-only">JukkaBros</span>
        </button>

        <button class="hotspot hotspot-peter" id="peters-head" type="button" data-target="peter" aria-label="Peter the Code Guardian">
          <img class="img-npc" src="images/Peter_head_big.png" alt="" aria-hidden="true">
          <span class="sr-only">Peter</span>
        </button>

        <button class="hotspot hotspot-anssi" type="button" data-target="anssi" aria-label="Anssi the Marketing Guy">
          <span class="sprite sprite-npc" aria-hidden="true">
            <img class="img-npc" src="images/AnssiFront.png" alt="" aria-hidden="true">
          </span>
          <span class="sr-only">Anssi</span>
        </button>

        <button class="hotspot hotspot-jukkabros" type="button" data-target="jukkabros" aria-label="Johan the Shop Steward">
          <span class="sprite sprite-npc" aria-hidden="true">
            <img class="img-npc" src="images/JukkaBrosFront.png" alt="" aria-hidden="true">
          </span>
          <span class="sr-only">Johan</span>
        </button>

        <button class="hotspot hotspot-scrum-menu" type="button" data-target="scrumMenu" aria-label="Scrum Bar menu">
          <span class="sr-only">Scrum Bar menu</span>
        </button>

        <div id="player" class="player" aria-hidden="true">
          <img class="img-player" src="images/DevssonFront.png" alt="" aria-hidden="true">
        </div>

        <div id="dev-help-overlay" class="dev-help-overlay" hidden aria-hidden="true"></div>

        <section id="dialogue-panel" class="dialogue-panel" hidden aria-live="polite" aria-label="Dialogue">
          <div id="dialogue-speaker" class="dialogue-speaker"></div>
          <div id="dialogue-text" class="dialogue-text"></div>
          <div id="dialogue-choices" class="dialogue-choices" hidden></div>
        </section>
      </section>

      <section class="command-panel" aria-label="Adventure commands and inventory">
        <p id="action-line" class="action-line" aria-live="polite">Walk to</p>

        <div class="panel-grid">
          <div class="verbs-panel" aria-label="Available actions">
            <button class="verb is-selected" type="button" data-verb="walk">Walk to</button>
            <button class="verb" type="button" data-verb="look">Look at</button>
            <button class="verb" type="button" data-verb="talk">Talk to</button>
            <button class="verb" type="button" data-verb="pickup">Pick up</button>
            <button class="verb" type="button" data-verb="use">Use</button>
            <button class="verb" type="button" data-verb="debug">Debug</button>
          </div>

          <section class="inventory-panel" aria-label="Inventory items">
            <ul id="inventory-list" class="inventory-list">
              <li class="inventory-empty">Empty</li>
            </ul>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script src="game.js"></script>
</body>
</html>
